<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Контакты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet" type="text/css">
</head>
<body>
  <aside class="sidebar d-flex flex-column">
    <div>
      <div class="d-flex align-items-center px-3 py-3 border-bottom">
        <span class="fs-4 fw-bold"><i class="bi bi-bootstrap"></i> Меню</span>
      </div>
      <nav class="nav flex-column mt-2">
        <a class="nav-link" href="main_page.html"><i class="bi bi-house"></i> Главная</a>
        <a class="nav-link" href="category.html"><i class="bi bi-collection"></i> Категории</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-card-list"></i> Заказы</a>
        <a class="nav-link active" href="contacts.html"><i class="bi bi-envelope"></i> Контакты</a>
      </nav>
    </div>
    <div class="user-menu">
      <div class="dropdown">
        <button class="btn btn-dark d-flex align-items-center w-100 dropdown-toggle" type="button" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
          <img src="https://avatars.githubusercontent.com/u/208442140?s=400&v=4" alt="avatar" width="24" height="24" class="rounded-circle me-2">
          Пользователь
        </button>
        <ul class="dropdown-menu" aria-labelledby="dropdownUser">
          <li><a class="dropdown-item" href="#">Профиль</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="#">Выход</a></li>
        </ul>
      </div>
    </div>
  </aside>
  <main class="main-content">
    <div class="container-fluid">
      <h1 class="text-center mb-4 mt-2">Контакты</h1>
      <div class="row justify-content-center">
        <div class="col-md-5">
          <form>
            <div class="mb-3">
              <label for="name" class="form-label">Имя</label>
              <input type="text" class="form-control" id="name" placeholder="Ваше имя">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Почта</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Сообщение</label>
              <textarea class="form-control" id="message" rows="3" placeholder="Ваше сообщение"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Отправить</button>
          </form>
        </div>
        <div class="col-md-5">
          <h4>Наши контакты</h4>
          <p>Здесь может быть текст с контактной информацией или описанием вашей компании.</p>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
